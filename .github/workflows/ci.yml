name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions: {}

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          cache: true

      - name: Format
        run: deno fmt --check
      - name: Lint
        run: deno lint
      - name: Test
        run: deno task test
      - name: TypeCheck
        run: deno task typecheck
      - name: Build
        run: deno task build

  e2e:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ["20.x", "22.x", "24.x", "26.x"]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          cache: true
      - name: Build
        run: deno task build
      - name: E2E Test
        run: deno task test:e2e
